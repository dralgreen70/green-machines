name: Sync Swim Times

on:
  schedule:
    # Every Sunday at 8 PM Eastern (Monday 00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run sync
        run: npm run sync
        env:
          DATABASE_URL: "file:./prisma/dev.db"

      - name: Check for database changes
        id: changes
        run: |
          git diff --quiet prisma/dev.db || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated database
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prisma/dev.db
          git commit -m "chore: sync swim times [$(date -u +%Y-%m-%d)]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure
        if: failure()
        run: echo "::error::Swim times sync failed! Check the logs above for details."
